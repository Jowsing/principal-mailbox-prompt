interface:
  display_name: "Principal Mailbox Prompt"
  short_description: "Script-driven 校长信箱 two-page frontend generation"
  default_prompt: "按技能脚本执行校长信箱前端生成：先收集 UI 风格，5 分钟无应答用默认；再逐项询问首页业务元素并保存 answers；再基于风格、answers 和完整合同用 imagegen2 优先生成并确认登录页+首页设计稿；最后运行 task-pack/frontend-prompt-kit 落地真实工程文件。默认新项目 React + Ant Design。固定接口、window 全局变量、payload、跳转、登录 data redirect、错误反馈、验证码倒计时、我的信件登录后二级视图、两页打包产物和预览/生产隔离不可改。"
