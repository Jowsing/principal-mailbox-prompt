interface:
  display_name: "Principal Mailbox Prompt"
  short_description: "Script-driven 校长信箱 two-page frontend generation"
  default_prompt: "先询问 UI 风格描述，不要立即出图；再强制逐项询问首页业务元素并保存 answers；然后基于 UI 风格和已确认元素，主动补足专业学校门户框架、学校特色和精致优美视觉，吸收全球高校首页优秀模式但不复制单一模板，并优先用 imagegen2 生成/确认登录页+首页设计稿；不同学校出图相似度不得高于 50%；设计稿必须只使用已确认元素，不允许自由发挥新增模块；代码必须按确认设计稿实现；之后运行 task-pack.mjs 生成低上下文任务包并落地真实前端工程文件；空目录或未指定技术栈默认 React + Ant Design；业务逻辑和交互标准要细；我的信件列表只能作为登录后的首页二级视图展示；预览 mock 与生产纯净 JS 产物必须隔离。"
