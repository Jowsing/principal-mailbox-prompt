interface:
  display_name: "Principal Mailbox Prompt"
  short_description: "Script-driven 校长信箱 two-page frontend generation"
  default_prompt: "先询问 UI 风格描述，主动补足专业学校门户框架、学校特色和精致优美视觉，吸收全球高校首页优秀模式但不复制单一模板，并优先用 imagegen2 生成/确认登录页+首页效果图；不同学校出图相似度不得高于 50%；再强制逐项询问首页业务元素并保存 answers，然后运行 task-pack.mjs 生成低上下文任务包并落地真实前端工程文件；空目录或未指定技术栈默认 React + Ant Design；业务逻辑和交互标准要细；我的信件列表只能作为登录后的首页二级视图展示；预览 mock 与生产纯净 JS 产物必须隔离。"
